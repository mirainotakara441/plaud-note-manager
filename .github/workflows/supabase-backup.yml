name: Supabase Backup

# AIワークOSのSupabaseを週1でバックアップし、gpg対称暗号化してartifactに保存する。
# 無料プランは自動バックアップが無いため、これがオフサイト復旧手段（ローカルlaunchdと二段構え）。
#
# 方式: ローカルの backup.sh と同じく backup Edge Function を叩き、全テーブルをJSONで取得する。
#   pg_dump（DBパスワード入り接続文字列が必要）をやめ、anon key で叩けるEdge Functionに統一した。
#   → 設定が簡単（DBパスワード不要）＆ローカルと復元手順が同じ（行INSERTで戻す）。
#
# ★このリポジトリは PUBLIC。公開リポジトリの artifact は誰でもDL可能なので、日記・商談データを
#   平文で置くと流出する。必ず gpg 対称暗号化してからアップロードする（復号にパスフレーズが要る）。
#
# 必要な GitHub Secrets（リポジトリ Settings → Secrets and variables → Actions）:
#   - SUPABASE_URL       : 例 https://zuadqnarsoykplkafyxv.supabase.co
#   - SUPABASE_ANON_KEY  : anon（公開）キーのJWT。backup Edge Function の認証に使う
#   - BACKUP_PASSPHRASE  : ダンプ暗号化のパスフレーズ（復元時にこれで復号。無くすと復元不能）
#
# 復元:  gpg -o backup.json.gz -d aiworkos_backup_XXXX.json.gz.gpg  → gunzip → tables.<表名> の全行をINSERT。

on:
  schedule:
    - cron: "0 18 * * 1" # 毎週月曜 18:00 UTC（＝火曜 03:00 JST）
  workflow_dispatch: {} # 手動でも実行できる

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: backup Edge Function を取得 → gzip → gpg対称暗号化
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          PASSPHRASE: ${{ secrets.BACKUP_PASSPHRASE }}
        run: |
          for v in SUPABASE_URL SUPABASE_ANON_KEY PASSPHRASE; do
            if [ -z "${!v}" ]; then
              echo "::error::$v secret が未設定です。リポジトリの Settings → Secrets で登録してください。"
              exit 1
            fi
          done

          STAMP=$(date -u +%Y%m%d-%H%M)
          OUT="aiworkos_backup_${STAMP}.json"
          HTTP=$(curl -s -o "$OUT" -w "%{http_code}" -X POST "$SUPABASE_URL/functions/v1/backup" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" \
            -d '{"include_embedding":true}' --max-time 180)
          if [ "$HTTP" != "200" ]; then
            echo "::error::backup Edge Function が HTTP $HTTP を返しました（URL・anon keyを確認）"
            head -c 300 "$OUT" || true
            exit 1
          fi

          # 健全性チェック: memory_chunks が1件以上あること（空バックアップを弾く）
          COUNT=$(python3 -c "import json;print(json.load(open('$OUT'))['counts'].get('memory_chunks',0))" 2>/dev/null || echo 0)
          if [ "$COUNT" -lt 1 ]; then
            echo "::error::memory_chunks=0（中身が空）。取得内容を確認してください。"
            exit 1
          fi
          echo "取得OK: memory_chunks=$COUNT"

          gzip "$OUT"
          # ★公開リポジトリの artifact は世界中からDL可能。平文を置かず必ず暗号化する（AES256）。
          gpg --batch --yes --pinentry-mode loopback --passphrase "$PASSPHRASE" \
            --cipher-algo AES256 --symmetric -o "${OUT}.gz.gpg" "${OUT}.gz"
          rm -f "${OUT}.gz"   # 平文は残さない。暗号化済みだけをアップロードする。
          ls -lh "${OUT}.gz.gpg"
          echo "ARTIFACT=${OUT}.gz.gpg" >> "$GITHUB_ENV"

      - name: 復号スモークテスト（パスフレーズで戻せることを確認）
        env:
          PASSPHRASE: ${{ secrets.BACKUP_PASSPHRASE }}
        run: |
          gpg --batch --yes --pinentry-mode loopback --passphrase "$PASSPHRASE" \
            -o roundtrip.json.gz -d "$ARTIFACT"
          gzip -t roundtrip.json.gz && echo "OK: 復号→gzip検証に成功"
          rm -f roundtrip.json.gz

      - name: artifact に保存（暗号化済み・90日保持）
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ github.run_id }}
          path: "*.json.gz.gpg"
          retention-days: 90
